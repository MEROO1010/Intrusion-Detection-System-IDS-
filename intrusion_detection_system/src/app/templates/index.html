<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDS Live Inference Portal</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f6f9; }
        .container { max-width: 600px; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #333; margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px;}
        button:hover { background: #0056b3; }
        #result { margin-top: 20px; padding: 15px; border-radius: 4px; display: none; font-weight: bold; }
        .anomaly { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .normal { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    </style>
</head>
<body>

<div class="container">
    <h2>Network Traffic Telemetry</h2>
    <form id="metricsForm">
        <div class="form-group">
            <label>Duration (seconds):</label>
            <input type="number" name="duration" value="0" required>
        </div>
        <div class="form-group">
            <label>Protocol Type:</label>
            <select name="protocol_type">
                <option value="tcp">tcp</option>
                <option value="udp">udp</option>
                <option value="icmp">icmp</option>
            </select>
        </div>
        <div class="form-group">
            <label>Service:</label>
            <select name="service">
                <option value="http">http</option>
                <option value="private">private</option>
                <option value="ftp_data">ftp_data</option>
                <option value="smtp">smtp</option>
            </select>
        </div>
        <div class="form-group">
            <label>Flag:</label>
            <select name="flag">
                <option value="SF">SF</option>
                <option value="S0">S0</option>
                <option value="REJ">REJ</option>
            </select>
        </div>
        <div class="form-group">
            <label>Source Bytes:</label>
            <input type="number" name="src_bytes" value="0" required>
        </div>
        <div class="form-group">
            <label>Destination Bytes:</label>
            <input type="number" name="dst_bytes" value="0" required>
        </div>
        <button type="submit">Analyze Payload</button>
    </form>

    <div id="result"></div>
</div>

<script>
    document.getElementById('metricsForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData.entries());
        
        const response = await fetch('/predict', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        
        const resEl = document.getElementById('result');
        const result = await response.json();
        
        resEl.style.display = 'block';
        if(result.status === 'success') {
            resEl.innerText = `Classification: ${result.prediction} (${result.confidence})`;
            if (result.prediction.includes("Anomaly")) {
                resEl.className = 'anomaly';
            } else {
                resEl.className = 'normal';
            }
        } else {
            resEl.innerText = "Error tracking metric: " + result.message;
            resEl.className = 'anomaly';
        }
    });
</script>
</body>
</html>
