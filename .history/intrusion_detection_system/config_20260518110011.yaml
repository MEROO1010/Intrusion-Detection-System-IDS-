data:
  raw_train_path: "data/raw/KDDTrain+.txt"
  raw_test_path: "data/raw/KDDTest+.txt"
  processed_train_path: "data/processed/train_processed.csv"
  processed_test_path: "data/processed/test_processed.csv"
  columns: [
    "duration", "protocol_type", "service", "flag", "src_bytes", "dst_bytes",
    "land", "wrong_fragment", "urgent", "hot", "num_failed_logins", "logged_in",
    "num_compromised", "root_shell", "su_attempted", "num_root", "num_file_creations",
    "num_shells", "num_access_files", "num_outbound_cmds", "is_host_login",
    "is_guest_login", "count", "srv_count", "serror_rate", "srv_serror_rate",
    "rerror_rate", "srv_rerror_rate", "same_srv_rate", "diff_srv_rate",
    "srv_diff_host_rate", "dst_host_count", "dst_host_srv_count",
    "dst_host_same_srv_rate", "dst_host_diff_srv_rate", "dst_host_same_src_port_rate",
    "dst_host_srv_diff_host_rate", "dst_host_serror_rate", "dst_host_srv_serror_rate",
    "dst_host_rerror_rate", "dst_host_srv_rerror_rate", "label", "difficulty_score"
  ]

models:
  scaler_path: "models/scaler.pkl"
  rf_path: "models/random_forest_model.pkl"
  xgb_path: "models/xgboost_model.pkl"
  svm_path: "models/svm_model.pkl"
  
hyperparameters:
  random_forest:
    n_estimators: 100
    max_depth: 15
    random_state: 42
  xgboost:
    n_estimators: 100
    max_depth: 6
    learning_rate: 0.1
    random_state: 42
  svm:
    kernel: "rbf"
    C: 1.0
    random_state: 42